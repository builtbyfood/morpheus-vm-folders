events { worker_processes 1; }
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        # Redirect root to vmfolders
        location = / {
            return 302 /vmfolders/;
        }

        # Serve the SPA
        location /vmfolders/ {
            alias /usr/share/nginx/html/vmfolders/;
            index index.html;
            try_files $uri $uri/ /vmfolders/index.html;
        }

        # Proxy to companion Python API
        location /vmfolders-api/ {
            proxy_pass http://127.0.0.1:8181/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
