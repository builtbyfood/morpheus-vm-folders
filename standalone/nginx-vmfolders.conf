# Add this inside the server {} block in Morpheus's nginx config
# Typically at: /opt/morpheus/embedded/nginx/conf/nginx.conf
# Add before the closing } of the server block

    # VM Folders standalone app
    location /vmfolders {
        alias /opt/morpheus/embedded/nginx/html/vmfolders;
        index index.html;
        try_files $uri $uri/ /vmfolders/index.html;
    }

    # VM Folders API proxy (to companion Python service)
    location /vmfolders-api/ {
        proxy_pass http://127.0.0.1:8181/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
